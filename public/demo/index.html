<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT Gateway - Demo Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:#1e293b;border-bottom:1px solid rgba(255,255,255,.05);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.rate-bar{display:flex;gap:16px;font-size:13px}
.rate-bar span{padding:4px 12px;border-radius:8px;background:rgba(255,255,255,.05)}
.container{max-width:900px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#1e293b;border:1px solid rgba(255,255,255,.05);border-radius:16px;padding:24px}
.card h2{font-size:15px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card.full{grid-column:1/-1}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#64748b;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e2e8f0;font-size:14px}
.form-group input:focus{outline:none;border-color:#f59e0b}
.btn{width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:.2s;margin-top:8px}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-deposit{background:linear-gradient(135deg,#10b981,#06b6d4);color:#fff}
.btn-withdraw{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.btn-check{background:rgba(255,255,255,.05);color:#94a3b8;border:1px solid rgba(255,255,255,.1)}
.result{margin-top:12px;padding:14px;background:rgba(0,0,0,.3);border-radius:10px;font-size:12px;display:none;max-height:250px;overflow-y:auto}
.result.show{display:block}
.result-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.result-row:last-child{border:none}
.result-row .k{color:#64748b}.result-row .v{color:#e2e8f0;font-weight:500}
.qr-box{text-align:center;margin-top:12px}
.qr-box img{border-radius:12px;background:#fff;padding:8px}
.mono{font-family:'Fira Code',monospace;font-size:11px}
.text-green{color:#10b981}.text-red{color:#ef4444}.text-amber{color:#f59e0b}.text-blue{color:#3b82f6}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.pending{background:rgba(245,158,11,.15);color:#f59e0b}
.badge.confirmed,.badge.sent{background:rgba(16,185,129,.15);color:#10b981}
.history-table{width:100%;font-size:12px;border-collapse:collapse;margin-top:12px}
.history-table th{text-align:left;padding:6px 8px;color:#64748b;font-size:10px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.05)}
.history-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.03)}
.est{margin-top:8px;padding:8px 12px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);border-radius:8px;font-size:12px;color:#f59e0b;display:none}
</style>
</head>
<body>

<div class="header">
  <h1>💎 USDT Gateway — Demo Test</h1>
  <div class="rate-bar">
    <span>Nạp: <b id="depRate" class="text-green">-</b> VND</span>
    <span>Rút: <b id="wdRate" class="text-red">-</b> VND</span>
    <span id="rateSource" style="color:#64748b">loading...</span>
  </div>
</div>

<div class="container">
  <!-- NẠP USDT -->
  <div class="card">
    <h2>📥 Nạp USDT</h2>
    <div class="form-group">
      <label>Số lượng USDT</label>
      <input id="depAmount" type="number" value="100" step="0.01" oninput="calcDeposit()">
    </div>
    <div class="est" id="depEstimate"></div>
    <div class="form-group">
      <label>Mã đơn đối tác (tuỳ chọn)</label>
      <input id="depOrderId" placeholder="VD: ORDER-001">
    </div>
    <button class="btn btn-deposit" onclick="createDeposit()">Tạo đơn nạp</button>
    <div class="result" id="depResult"></div>
  </div>

  <!-- RÚT USDT -->
  <div class="card">
    <h2>📤 Rút USDT</h2>
    <div class="form-group">
      <label>Số lượng USDT</label>
      <input id="wdAmount" type="number" value="50" step="0.01" oninput="calcWithdraw()">
    </div>
    <div class="est" id="wdEstimate"></div>
    <div class="form-group">
      <label>Ví nhận (TRC20)</label>
      <input id="wdAddress" placeholder="TXyz...">
    </div>
    <button class="btn btn-withdraw" onclick="createWithdraw()">Tạo đơn rút</button>
    <div class="result" id="wdResult"></div>
  </div>

  <!-- TRA CỨU -->
  <div class="card">
    <h2>🔍 Tra cứu đơn</h2>
    <div class="form-group">
      <label>Mã đơn</label>
      <input id="checkCode" placeholder="UDEP-xxx hoặc UWD-xxx">
    </div>
    <button class="btn btn-check" onclick="checkStatus()">Tra cứu</button>
    <div class="result" id="checkResult"></div>
  </div>

  <!-- CẤU HÌNH -->
  <div class="card">
    <h2>⚙️ Cấu hình API</h2>
    <div class="form-group">
      <label>API Key</label>
      <input id="apiKey" value="ugw_demo_test_key_12345">
    </div>
    <div class="form-group">
      <label>Server URL</label>
      <input id="serverUrl" value="">
    </div>
    <button class="btn btn-check" onclick="loadRate()">🔄 Refresh tỷ giá</button>
  </div>

  <!-- LỊCH SỬ -->
  <div class="card full">
    <h2>📋 Lịch sử giao dịch</h2>
    <div id="historyContent">Đang tải...</div>
  </div>
</div>

<script>
// Auto-detect server URL
document.getElementById('serverUrl').value = window.location.origin;

let currentRates = {};

function getKey() { return document.getElementById('apiKey').value; }
function getUrl() { return document.getElementById('serverUrl').value; }

async function callApi(path, opts = {}) {
  const res = await fetch(getUrl() + '/api/v1' + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'x-api-key': getKey(), ...(opts.headers||{}) },
  });
  return res.json();
}

function showResult(id, data) {
  const el = document.getElementById(id);
  el.classList.add('show');

  if (data.success && data.data) {
    const d = data.data;
    let html = '';

    // Wallet address with copy button (for deposit)
    if (d.walletAddress) {
      html += `<div style="margin-bottom:12px;padding:12px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:10px">
        <div style="font-size:11px;color:#64748b;margin-bottom:4px">Địa chỉ ví nhận USDT (TRC20):</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="mono" style="flex:1;word-break:break-all;color:#10b981;font-size:13px;font-weight:600">${d.walletAddress}</span>
          <button onclick="copyText('${d.walletAddress}')" style="padding:6px 12px;border:1px solid rgba(16,185,129,.3);background:rgba(16,185,129,.1);color:#10b981;border-radius:8px;cursor:pointer;font-size:12px;white-space:nowrap">📋 Copy</button>
        </div>
      </div>`;
    }

    // QR code for deposit
    if (d.qrCodeUrl) {
      html += `<div class="qr-box"><img src="${d.qrCodeUrl}" width="180" height="180"><div style="margin-top:8px;font-size:11px;color:#64748b">Quét QR để lấy địa chỉ ví</div></div>`;
    }

    // Warning — different for deposit vs withdraw
    if (d.walletAddress && d.amount) {
      // DEPOSIT warning: exact amount
      html += `<div style="margin-top:12px;padding:12px 14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px">
        <div style="font-size:13px;font-weight:700;color:#ef4444;margin-bottom:6px">⚠️ LƯU Ý QUAN TRỌNG</div>
        <div style="font-size:12px;color:#fca5a5;line-height:1.6">
          • Chuyển chính xác <b style="color:#fff">${d.amount} USDT</b> — sai số tiền hệ thống <b>KHÔNG tự động cộng</b><br>
          • Khi rút từ sàn, phí mạng lưới có thể bị <b>trừ vào số USDT gửi</b>. Hãy đảm bảo số tiền <b>thực nhận</b> tại ví đích đúng ${d.amount} USDT<br>
          • Ví dụ: Nếu phí rút là 1 USDT, hãy gửi <b>${d.amount + 1} USDT</b> để ví nhận đúng ${d.amount} USDT<br>
          • Giao dịch sai số tiền cần liên hệ admin để xử lý thủ công
        </div>
      </div>`;
    } else if (d.toAddress) {
      // WITHDRAW warning: verify address
      html += `<div style="margin-top:12px;padding:12px 14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px">
        <div style="font-size:13px;font-weight:700;color:#f59e0b;margin-bottom:6px">⚠️ XÁC NHẬN ĐỊA CHỈ VÍ NHẬN</div>
        <div style="font-size:12px;color:#fcd34d;line-height:1.6">
          • Kiểm tra kỹ địa chỉ ví nhận: <b style="color:#fff">${d.toAddress}</b><br>
          • Chuyển sai ví hệ thống <b>KHÔNG chịu trách nhiệm</b> và <b>KHÔNG thể hoàn tiền</b><br>
          • Chỉ hỗ trợ mạng <b>TRC20 (TRON)</b> — gửi sang mạng khác sẽ <b>MẤT tiền</b>
        </div>
      </div>`;
    }

    // Key-value pairs
    const labels = {
      orderCode: 'Mã đơn', amount: 'Số USDT', exchangeRate: 'Tỷ giá',
      estimatedVnd: 'Ước tính VND', amountVnd: 'Số VND', expiresAt: 'Hết hạn',
      expiryMinutes: 'Hiệu lực', network: 'Mạng', status: 'Trạng thái',
      toAddress: 'Ví nhận', txHash: 'TX Hash',
    };
    for (const [k, v] of Object.entries(d)) {
      if (k === 'qrCodeUrl' || k === 'walletAddress') continue;
      const label = labels[k] || k;
      let display = v;
      if (k === 'status') display = `<span class="badge ${String(v).toLowerCase()}">${v}</span>`;
      else if (k === 'estimatedVnd' || k === 'amountVnd') display = Number(v).toLocaleString() + ' VND';
      else if (k === 'exchangeRate') display = Number(v).toLocaleString() + ' VND/USDT';
      else if (k === 'amount') display = v + ' USDT';
      else if (k === 'expiryMinutes') display = v + ' phút';
      html += `<div class="result-row"><span class="k">${label}</span><span class="v">${display}</span></div>`;
    }
    el.innerHTML = html;
  } else {
    el.innerHTML = `<div style="color:#ef4444">❌ ${data.error || 'Lỗi không xác định'}</div>`;
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Copied!';
    setTimeout(() => { btn.textContent = '📋 Copy'; }, 2000);
  });
}

// Rate
async function loadRate() {
  try {
    const data = await callApi('/rate');
    if (data.success) {
      currentRates = data.data;
      document.getElementById('depRate').textContent = data.data.depositRate?.toLocaleString();
      document.getElementById('wdRate').textContent = data.data.withdrawRate?.toLocaleString();
      document.getElementById('rateSource').textContent = data.data.source;
      calcDeposit();
      calcWithdraw();
    }
  } catch(e) {
    document.getElementById('rateSource').textContent = 'error';
  }
}

function calcDeposit() {
  const amount = parseFloat(document.getElementById('depAmount').value) || 0;
  const el = document.getElementById('depEstimate');
  if (currentRates.depositRate && amount > 0) {
    const vnd = Math.round(amount * currentRates.depositRate);
    el.style.display = 'block';
    el.innerHTML = `💰 ${amount} USDT ≈ <b>${vnd.toLocaleString()} VND</b>`;
  } else {
    el.style.display = 'none';
  }
}

function calcWithdraw() {
  const amount = parseFloat(document.getElementById('wdAmount').value) || 0;
  const el = document.getElementById('wdEstimate');
  if (currentRates.withdrawRate && amount > 0) {
    const vnd = Math.round(amount * currentRates.withdrawRate);
    el.style.display = 'block';
    el.innerHTML = `💰 ${amount} USDT ≈ <b>${vnd.toLocaleString()} VND</b>`;
  } else {
    el.style.display = 'none';
  }
}

// Deposit
let _pollTimer = null;

async function createDeposit() {
  const data = await callApi('/deposit', {
    method: 'POST',
    body: JSON.stringify({
      amount: parseFloat(document.getElementById('depAmount').value),
      orderId: document.getElementById('depOrderId').value || undefined,
    }),
  });
  showResult('depResult', data);
  loadHistory();

  // Start polling for confirmation
  if (data.success && data.data?.orderCode) {
    startPolling(data.data.orderCode);
  }
}

function startPolling(orderCode) {
  if (_pollTimer) clearInterval(_pollTimer);

  // Add waiting indicator
  const resultEl = document.getElementById('depResult');
  const waitEl = document.createElement('div');
  waitEl.id = 'pollStatus';
  waitEl.style.cssText = 'margin-top:10px;padding:10px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;font-size:12px;color:#f59e0b;text-align:center';
  waitEl.innerHTML = '⏳ Đang chờ xác nhận blockchain... (tự động kiểm tra mỗi 10s)';
  resultEl.appendChild(waitEl);

  let checks = 0;
  _pollTimer = setInterval(async () => {
    checks++;
    try {
      const res = await callApi('/status/' + orderCode);
      if (res.success && res.data) {
        const pollEl = document.getElementById('pollStatus');
        if (res.data.status === 'CONFIRMED') {
          clearInterval(_pollTimer);
          _pollTimer = null;
          if (pollEl) pollEl.remove();
          showDepositSuccess(res.data);
          loadHistory();
        } else if (res.data.status === 'EXPIRED') {
          clearInterval(_pollTimer);
          _pollTimer = null;
          if (pollEl) {
            pollEl.style.background = 'rgba(239,68,68,.08)';
            pollEl.style.borderColor = 'rgba(239,68,68,.2)';
            pollEl.style.color = '#ef4444';
            pollEl.innerHTML = '⌛ Đơn đã hết hạn';
          }
        } else if (pollEl) {
          pollEl.innerHTML = `⏳ Đang chờ... (${checks * 10}s) — Nạp đúng số USDT vào ví phía trên`;
        }
      }
    } catch {}
    // Stop after 35 minutes
    if (checks > 210) { clearInterval(_pollTimer); _pollTimer = null; }
  }, 10000);
}

function showDepositSuccess(data) {
  // Toast notification
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:16px 28px;background:linear-gradient(135deg,#10b981,#06b6d4);color:#fff;border-radius:14px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 8px 30px rgba(16,185,129,.4);animation:slideDown .4s ease';
  toast.innerHTML = `✅ Nạp thành công! ${data.amount || data.amountUsdt} USDT = ${(data.amountVnd || 0).toLocaleString()} VND`;
  document.body.appendChild(toast);

  // Add animation
  const style = document.createElement('style');
  style.textContent = '@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
  document.head.appendChild(style);

  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .5s'; }, 5000);
  setTimeout(() => toast.remove(), 5500);

  // Update result panel
  const resultEl = document.getElementById('depResult');
  resultEl.innerHTML = `
    <div style="padding:14px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:10px;text-align:center">
      <div style="font-size:24px;margin-bottom:6px">✅</div>
      <div style="font-size:14px;font-weight:700;color:#10b981">Nạp thành công!</div>
      <div style="margin-top:8px;font-size:12px;color:#e2e8f0">${data.amount || data.amountUsdt} USDT = <b>${(data.amountVnd || 0).toLocaleString()} VND</b></div>
      <div class="mono" style="margin-top:6px;color:#64748b">TX: ${data.txHash || '-'}</div>
      <div class="mono" style="margin-top:4px;color:#64748b">Mã: ${data.orderCode || '-'}</div>
    </div>
  `;
  resultEl.classList.add('show');
}

// Withdraw
let _wdPollTimer = null;

async function createWithdraw() {
  const addr = document.getElementById('wdAddress').value;
  if (!addr) { alert('Nhập địa chỉ ví nhận'); return; }
  const data = await callApi('/withdraw', {
    method: 'POST',
    body: JSON.stringify({
      amount: parseFloat(document.getElementById('wdAmount').value),
      toAddress: addr,
    }),
  });
  showResult('wdResult', data);
  loadHistory();

  if (data.success && data.data?.orderCode) {
    startWdPolling(data.data.orderCode);
  }
}

function startWdPolling(orderCode) {
  if (_wdPollTimer) clearInterval(_wdPollTimer);
  const resultEl = document.getElementById('wdResult');
  const waitEl = document.createElement('div');
  waitEl.id = 'wdPollStatus';
  waitEl.style.cssText = 'margin-top:10px;padding:10px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;font-size:12px;color:#f59e0b;text-align:center';
  waitEl.innerHTML = '⏳ Đang chờ duyệt & gửi USDT...';
  resultEl.appendChild(waitEl);

  let checks = 0;
  _wdPollTimer = setInterval(async () => {
    checks++;
    try {
      const res = await callApi('/status/' + orderCode);
      if (res.success && res.data) {
        const pollEl = document.getElementById('wdPollStatus');
        if (res.data.status === 'SENT') {
          clearInterval(_wdPollTimer); _wdPollTimer = null;
          if (pollEl) pollEl.remove();
          showWithdrawSuccess(res.data);
          loadHistory();
        } else if (res.data.status === 'REJECTED' || res.data.status === 'FAILED') {
          clearInterval(_wdPollTimer); _wdPollTimer = null;
          if (pollEl) {
            pollEl.style.background = 'rgba(239,68,68,.08)';
            pollEl.style.borderColor = 'rgba(239,68,68,.2)';
            pollEl.style.color = '#ef4444';
            pollEl.innerHTML = `❌ ${res.data.status === 'REJECTED' ? 'Lệnh rút bị từ chối' : 'Gửi USDT thất bại'}`;
          }
        } else if (res.data.status === 'APPROVED' || res.data.status === 'SENDING') {
          if (pollEl) pollEl.innerHTML = '📤 Đã duyệt — đang gửi USDT on-chain...';
        } else if (pollEl) {
          pollEl.innerHTML = `⏳ Chờ admin duyệt... (${checks * 10}s)`;
        }
      }
    } catch {}
    if (checks > 360) { clearInterval(_wdPollTimer); _wdPollTimer = null; }
  }, 10000);
}

function showWithdrawSuccess(data) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:16px 28px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;border-radius:14px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 8px 30px rgba(245,158,11,.4);animation:slideDown .4s ease';
  toast.innerHTML = `💸 Rút thành công! ${data.amount || data.amountUsdt} USDT`;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .5s'; }, 5000);
  setTimeout(() => toast.remove(), 5500);

  const resultEl = document.getElementById('wdResult');
  resultEl.innerHTML = `
    <div style="padding:14px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;text-align:center">
      <div style="font-size:24px;margin-bottom:6px">💸</div>
      <div style="font-size:14px;font-weight:700;color:#f59e0b">Rút thành công!</div>
      <div style="margin-top:8px;font-size:12px;color:#e2e8f0">${data.amount || data.amountUsdt} USDT</div>
      <div class="mono" style="margin-top:6px;color:#64748b">TX: ${data.txHash || '-'}</div>
      <div class="mono" style="margin-top:4px;color:#64748b">Mã: ${data.orderCode || '-'}</div>
    </div>
  `;
  resultEl.classList.add('show');
}

// Status
async function checkStatus() {
  const code = document.getElementById('checkCode').value;
  if (!code) { alert('Nhập mã đơn'); return; }
  const data = await callApi('/status/' + code);
  showResult('checkResult', data);
}

// History
async function loadHistory() {
  try {
    const data = await callApi('/history?limit=10');
    if (data.success && data.data.history.length > 0) {
      let html = `<table class="history-table"><thead><tr><th>Loại</th><th>Mã đơn</th><th>USDT</th><th>VND</th><th>Trạng thái</th><th>Thời gian</th></tr></thead><tbody>`;
      for (const h of data.data.history) {
        const type = h.type === 'deposit' ? '<span class="text-green">📥 Nạp</span>' : '<span class="text-red">📤 Rút</span>';
        const time = new Date(h.createdAt).toLocaleString('vi-VN');
        html += `<tr>
          <td>${type}</td>
          <td class="mono">${h.orderCode}</td>
          <td><b>${h.amountUsdt}</b></td>
          <td>${h.amountVnd?.toLocaleString() || '-'}</td>
          <td><span class="badge ${h.status.toLowerCase()}">${h.status}</span></td>
          <td style="color:#64748b">${time}</td>
        </tr>`;
      }
      html += '</tbody></table>';
      html += `<div style="margin-top:8px;font-size:11px;color:#64748b">Tổng: ${data.data.pagination.totalDeposits} nạp, ${data.data.pagination.totalWithdrawals} rút</div>`;
      document.getElementById('historyContent').innerHTML = html;
    } else {
      document.getElementById('historyContent').innerHTML = '<span style="color:#64748b">Chưa có giao dịch</span>';
    }
  } catch {
    document.getElementById('historyContent').innerHTML = '<span style="color:#ef4444">Lỗi tải lịch sử</span>';
  }
}

// Init
loadRate();
loadHistory();
setInterval(loadRate, 30000);
</script>
</body>
